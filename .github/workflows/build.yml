name: Build CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FIXED_RUST_TOOLCHAIN: nightly-2025-05-20
  # Supported target scope: RISC-V64 and LoongArch64 on Linux hosts only.
  # x86_64, aarch64, and other targets are intentionally not gated here, and
  # macOS jobs are out of scope and must not block readiness.
  SUPPORTED_TARGET_LIST: riscv64,loongarch64

jobs:
  clippy:
    name: Clippy (${{ matrix.arch }}, ${{ matrix.lane }})
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    continue-on-error: ${{ matrix.lane == 'moving-nightly-observational' }}
    strategy:
      fail-fast: false
      matrix:
        arch: [riscv64, loongarch64]
        lane: [fixed-required, moving-nightly-observational]
    env:
      RUSTUP_TOOLCHAIN: ${{ matrix.lane == 'fixed-required' && 'nightly-2025-05-20' || 'nightly' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: ${{ env.RUSTUP_TOOLCHAIN }}
          components: rust-src, clippy, rustfmt
          targets: riscv64gc-unknown-none-elf, loongarch64-unknown-none-softfloat
      - name: Check Rust version
        run: rustc --version --verbose
      - name: Check code format
        if: ${{ matrix.arch == 'riscv64' && matrix.lane == 'fixed-required' }}
        run: cargo fmt --all -- --check
      - name: Clippy for ${{ matrix.arch }}
        run: make clippy ARCH=${{ matrix.arch }}

  build:
    name: Build (${{ matrix.arch }}, ${{ matrix.lane }})
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    continue-on-error: ${{ matrix.lane == 'moving-nightly-observational' }}
    strategy:
      fail-fast: false
      matrix:
        arch: [riscv64, loongarch64]
        lane: [fixed-required, moving-nightly-observational]
    env:
      RUSTUP_TOOLCHAIN: ${{ matrix.lane == 'fixed-required' && 'nightly-2025-05-20' || 'nightly' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: ${{ env.RUSTUP_TOOLCHAIN }}
          components: rust-src, llvm-tools
          targets: riscv64gc-unknown-none-elf, loongarch64-unknown-none-softfloat
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          shared-key: cargo-bin-cache-${{ env.RUSTUP_TOOLCHAIN }}
          cache-targets: false
      - name: Build shell
        run: make ARCH=${{ matrix.arch }} A=user/shell build
